function initFirebase(){
  try{firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();
    db.ref('attendees').on('value',snap=>{attendees=snap.val()||{};updateStats();renderTable();renderAdminMap();});
    db.ref('seatmap').on('value',snap=>{
      const data=snap.val();
      if(data){
        liveSeatMap=Object.values(data);
        renderAdminMap();
      }
    });
    db.ref('.info/connected').on('value',snap=>{const e=document.getElementById('fb-status');e.className='fb-status '+(snap.val()?'ok':'err');e.textContent=snap.val()?'🟢 已连接':'🔴 断开';});
  }catch(e){document.getElementById('fb-status').textContent='🔴 '+e.message;}
}

function switchTab(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(t==='checkin'&&i===0)||(t==='admin'&&i===1)));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+t).classList.add('active');}
function normName(n){return n?n.replace(/\s+/g,'').toLowerCase():'';}
function findAttendee(name){const q=normName(name);for(const[k,v]of Object.entries(attendees)){if(normName(v.name)===q)return{key:k,...v};}return null;}

function buildSeatMap(hlName,el){
  if(!el)return;
  const seats=liveSeatMap||SL;
  const rows=new Map();
  seats.forEach(s=>{if(!rows.has(s.r))rows.set(s.r,[]);rows.get(s.r).push(s);});

  // Build set of checked-in names for highlighting
  const checkedSet=new Set();
  Object.values(attendees).forEach(a=>{if(a.checked)checkedSet.add(normName(a.name));});

  function seatCls(s){
    const isMe=hlName&&s.name&&normName(s.name)===normName(hlName);
    if(isMe) return 'sc is-me';
    if(s.name&&checkedSet.has(normName(s.name))) return 'sc checked-in';
    if(s.name) return 'sc unchecked';
    return 'sc blue';
  }

  let h='<div class="smap-card"><div class="smap-title">座 位 图</div><div class="sr"><div class="sr-n"></div><div class="sc gap" style="width:224px"></div><div style="width:252px;text-align:center;padding:8px;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;letter-spacing:3px;background:var(--surface2);flex-shrink:0">屏 幕</div><div class="sc gap" style="width:196px"></div></div><div class="sg">';

  // Main rows 3-20: exact Excel column layout
  // Each column rendered as: A(1)=gap B(2)=seat C(3)=gap D(4)=seat E(5)=gap F(6)=seat G(7)=gap H(8)=seat
  // then 9 gap cols (9-17) for center aisle
  // then R(18)=seat S(19)=gap T(20)=seat U(21)=gap V(22)=seat W(23)=gap X(24)=seat
  // All gaps are same width as seats

  const seatCols=[2,4,6,8,18,20,22,24]; // columns that have seats
  const allCols=[]; // build full column list 1-24
  for(let c=1;c<=24;c++) allCols.push(c);

  for(let rk=3;rk<=20;rk++){
    const cellMap={};
    if(rows.has(rk)) rows.get(rk).forEach(s=>cellMap[s.c]=s);
    h+='<div class="sr">';
    h+=`<div class="sr-n">${rk-2}</div>`;
    for(const c of allCols){
      const s=cellMap[c];
      if(s){
        const dn=s.name?(s.name.length>3?s.name.substring(0,2):s.name):'';
        h+=`<div class="${seatCls(s)}" title="${(s.name||'')+' '+s.id}">${esc(dn)}</div>`;
      } else {
        h+='<div class="sc gap"></div>';
      }
    }
    h+='</div>';
  }

  // A区 row 21
  h+='<div style="height:8px"></div>';
  if(rows.has(21)){
    const cellMap={};
    rows.get(21).forEach(s=>cellMap[s.c]=s);
    h+='<div class="sr"><div class="sr-n"></div>';
    for(const c of allCols){
      const s=cellMap[c];
      if(s){
        const dn=s.name?(s.name.length>3?s.name.substring(0,2):s.name):'';
        h+=`<div class="${seatCls(s)}" title="${(s.name||'')+' '+s.id}">${esc(dn)}</div>`;
      } else {
        h+='<div class="sc gap"></div>';
      }
    }
    h+='</div>';
  }

  // 媒体区
  h+='<div style="height:10px"></div>';
  // 第一排：媒体区大标签，与座位图同宽
  h+='<div class="sr"><div class="sr-n"></div>';
  for(let c=1;c<=24;c++){
    if(c===1) h+='<div style="width:'+(24*28)+'px;height:22px;background:#0090c030;border:1px solid #0090c0;border-radius:3px;color:#40c0e0;font-size:10px;letter-spacing:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0">媒 体 区</div>';
  }
  h+='</div>';
  // 第二排：一整排蓝色座位
  h+='<div class="sr"><div class="sr-n"></div>';
  for(let c=1;c<=24;c++){
    h+='<div class="sc blue" style="font-size:0"></div>';
  }
  h+='</div>';

  h+='</div>';
  
  h+='<div class="sleg">';
  if(hlName) h+='<div class="sleg-i"><div class="sleg-d" style="background:var(--accent);border:2px solid #fff;"></div>您的位置</div>';
  h+='<div class="sleg-i"><div class="sleg-d" style="background:#34d39920;border:1px solid var(--success);"></div>已签到</div>';
  h+='<div class="sleg-i"><div class="sleg-d" style="background:var(--surface2);border:1px solid var(--border);opacity:.5;"></div>未签到</div>';
  h+='</div><div class="zoom-h">← 滑动查看 →</div></div>';
  el.innerHTML=h;
  if(hlName) setTimeout(()=>{const me=el.querySelector('.is-me');if(me)me.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});},300);
}

function doCheckin(){
  const input=document.getElementById('checkin-name'),name=input.value.trim();
  const box=document.getElementById('checkin-result'),mapA=document.getElementById('seat-map-area');
  if(!name){showToast('请输入姓名');input.focus();return;}
  if(!db){box.innerHTML='<div class="result-error">⚠️ 未连接数据库</div>';box.classList.add('show');mapA.innerHTML='';return;}
  const p=findAttendee(name);
  if(!p){box.innerHTML=`<div class="result-error"><div style="font-size:32px;margin-bottom:12px">😔</div><div>未找到「${esc(name)}」</div><div style="font-size:13px;margin-top:8px;opacity:.7">请确认姓名</div></div>`;box.classList.add('show');mapA.innerHTML='';input.value='';return;}
  const now=new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
  if(!p.checked) db.ref('attendees/'+p.key).update({checked:true,checkedAt:now});
  box.innerHTML=`<div class="result-success"><div class="check-icon">✓</div><div class="seat-label">您的座位</div><div class="seat-value">${esc(p.seat)}</div><div class="name-label">${esc(p.name)}，欢迎！</div><div class="time-label">${p.checkedAt||now}</div></div>`;
  box.classList.add('show');
  buildSeatMap(p.name,mapA);
  input.value='';
}

function handleFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const buf=ev.target.result;
    let text;
    try{
      // Try GBK first (Chinese Windows default)
      text=new TextDecoder('gbk').decode(buf);
      // Verify it decoded properly by checking for common chars
      if(text.includes(' ')) throw 'bad';
    }catch(e){
      try{text=new TextDecoder('utf-8').decode(buf);}
      catch(e2){text=new TextDecoder('utf-8',{fatal:false}).decode(buf);}
    }
    parseCSV(text);
  };
  r.readAsArrayBuffer(f);
  e.target.value='';
}

function parseCSV(text){
  if(!db){showToast('未连接');return;}
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const exist=new Set(Object.values(attendees).map(a=>normName(a.name)));
  const upd={};let added=0;
  const seatEntries=[];
  for(const line of lines){const p=line.split(',').map(s=>s.trim().replace(/^["']|["']$/g,''));
    if(p.length>=2){let name=p[0];const seat=p[1];
      if(/[\u4e00-\u9fff]/.test(name)) name=name.replace(/\s+/g,'');
      if(name&&seat&&!/^(姓名|name)$/i.test(name)){
        // Parse seat ID to get grid position
        const seatInfo=parseSeatId(name,seat);
        if(seatInfo) seatEntries.push(seatInfo);
        if(!exist.has(normName(name))){
          const k=db.ref('attendees').push().key;
          upd['attendees/'+k]={name,seat,checked:false,checkedAt:null};
          exist.add(normName(name));added++;
        }
      }
    }
  }
  // Write seatmap to Firebase (replace entirely)
  if(seatEntries.length>0){
    // Also add empty seats from SL that have no name
    const named=new Set(seatEntries.map(s=>s.r+'-'+s.c));
    SL.forEach(s=>{if(!s.name&&!named.has(s.r+'-'+s.c)) seatEntries.push(s);});
    db.ref('seatmap').set(seatEntries);
  }
  if(added>0)db.ref().update(upd).then(()=>showToast(`导入 ${added} 位`));
  else if(seatEntries.length>0) showToast('座位图已更新');
  else showToast('无新增');
}

function parseSeatId(name,seat){
  // 屏幕左第一列3号 → r:5, c:8
  const m=seat.match(/屏幕(左|右)第(一|二|三|四)列(\d+)号/);
  if(m){
    const side=m[1];
    const colMap={'一':1,'二':2,'三':3,'四':4};
    const cn=colMap[m[2]];
    const pos=parseInt(m[3]);
    const r=pos+2;
    // Left: col1→c8, col2→c6, col3→c4, col4→c2
    // Right: col1→c18, col2→c20, col3→c22, col4→c24
    const c=side==='左'?[0,8,6,4,2][cn]:[0,18,20,22,24][cn];
    return {r,c,id:seat,name,zone:'blue',side};
  }
  const m2=seat.match(/A区第(\d+)个/);
  if(m2){
    const idx=parseInt(m2[1]);
    return {r:21,c:8+idx,id:seat,name,zone:'blue',side:'center'};
  }
  return null;
}

function updateStats(){const l=Object.values(attendees);document.getElementById('stat-total').textContent=l.length;document.getElementById('stat-checked').textContent=l.filter(a=>a.checked).length;document.getElementById('stat-pending').textContent=l.filter(a=>!a.checked).length;}

function renderTable(){const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();const tb=document.getElementById('tb');const l=Object.values(attendees).filter(a=>!q||a.name.toLowerCase().includes(q));const keys=Object.entries(attendees);
  tb.innerHTML=l.length?l.map(a=>{
    const k=keys.find(([_,v])=>v.name===a.name);
    const key=k?k[0]:'';
    return `<tr><td style="font-weight:500">${esc(a.name)}</td><td style="color:var(--accent);font-weight:700;font-size:12px">${esc(a.seat)}</td><td>${a.checked?`<span class="status-badge checked" style="cursor:pointer" onclick="revokeCheckin('${key}','${esc(a.name)}')" title="点击撤销">已签到 ✕</span>`:`<span class="status-badge pending">未签到</span>`}</td></tr>`;
  }).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--text-dim);padding:28px">暂无数据</td></tr>';}

function generateQR(){const u=location.href.split('?')[0].split('#')[0];new QRious({element:document.getElementById('qr-canvas'),value:u,size:200,backgroundAlpha:0,foreground:'#c9a54e',level:'H'});document.getElementById('qr-url').textContent=u;showToast('已生成');}
function revokeCheckin(key,name){
  if(!db)return;
  if(confirm('确定撤销「'+name+'」的签到？')){
    db.ref('attendees/'+key).update({checked:false,checkedAt:null}).then(()=>showToast(name+' 已撤销签到'));
  }
}

function clearAllData(){if(!db)return;if(confirm('确定清空？'))db.ref('attendees').remove().then(()=>showToast('已清空'));}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

const uz=document.getElementById('upload-zone');
if(uz){uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over');});uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.csv')){const r=new FileReader();r.onload=ev=>parseCSV(ev.target.result);r.readAsText(f);}else showToast('请上传csv');});}
document.getElementById('checkin-name')?.addEventListener('keydown',e=>{if(e.key==='Enter')doCheckin();});
document.getElementById('admin-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin();});
initFirebase();
</script></body></html>
