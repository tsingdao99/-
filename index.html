<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商业研讨会 · 签到系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f14;
  --surface: #161a22;
  --surface2: #1e232d;
  --border: #2a3040;
  --text: #e8eaf0;
  --text-dim: #8892a4;
  --accent: #c9a54e;
  --accent-glow: #c9a54e33;
  --success: #34d399;
  --success-bg: #34d39915;
  --error: #f87171;
  --error-bg: #f8717115;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content:''; position:fixed; top:-30%; left:-10%;
  width:60vw; height:60vw;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.container {
  position:relative; z-index:1;
  max-width:520px; margin:0 auto;
  padding:20px 16px 40px; min-height:100vh;
}
.header { text-align:center; padding:36px 0 28px; }
.header .logo-icon {
  width:56px; height:56px; margin:0 auto 16px;
  background: linear-gradient(135deg, var(--accent), #e8c86a);
  border-radius:16px; display:flex; align-items:center; justify-content:center;
  font-size:28px; box-shadow: 0 8px 32px var(--accent-glow);
}
.header h1 {
  font-family:'Playfair Display',serif; font-size:28px; font-weight:900;
  letter-spacing:1px;
  background: linear-gradient(135deg, var(--accent), #f0dfa0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header .subtitle {
  color:var(--text-dim); font-size:13px; margin-top:6px;
  letter-spacing:3px; text-transform:uppercase;
}
.fb-status {
  text-align:center; padding:8px; font-size:12px;
  letter-spacing:1px; border-radius:50px; margin-bottom:16px;
}
.fb-status.ok { background:var(--success-bg); color:var(--success); border:1px solid var(--success); }
.fb-status.err { background:var(--error-bg); color:var(--error); border:1px solid var(--error); }
.fb-status.loading { background:var(--accent-glow); color:var(--accent); border:1px solid var(--accent); }
.tabs {
  display:flex; background:var(--surface); border-radius:50px;
  padding:4px; margin-bottom:24px; border:1px solid var(--border);
}
.tab {
  flex:1; padding:12px 0; text-align:center; border-radius:50px;
  font-size:14px; font-weight:500; cursor:pointer; transition:all .3s;
  color:var(--text-dim); border:none; background:none;
}
.tab.active {
  background:var(--accent); color:#0c0f14; font-weight:700;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.panel { display:none; animation: fadeUp .4s ease; }
.panel.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; margin-bottom:16px;
}
.card-title {
  font-size:13px; color:var(--text-dim); text-transform:uppercase;
  letter-spacing:2px; margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.card-title .dot { width:6px; height:6px; background:var(--accent); border-radius:50%; }
.input-group { position:relative; margin-bottom:16px; }
.input-group input {
  width:100%; padding:16px 20px; font-size:16px; font-family:inherit;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--radius); color:var(--text); outline:none;
  transition: border-color .3s, box-shadow .3s;
}
.input-group input:focus {
  border-color:var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
}
.input-group input::placeholder { color:var(--text-dim); }
.btn {
  width:100%; padding:16px; font-size:16px; font-weight:700; font-family:inherit;
  border:none; border-radius:var(--radius); cursor:pointer; transition:all .25s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #e8c86a);
  color:#0c0f14; box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow: 0 8px 32px var(--accent-glow); }
.btn-secondary { background:var(--surface2); color:var(--text); border:1.5px solid var(--border); }
.result-box { display:none; margin-top:20px; animation: fadeUp .5s ease; }
.result-box.show { display:block; }
.result-success {
  background:var(--success-bg); border:1.5px solid var(--success);
  border-radius:var(--radius); padding:28px 24px; text-align:center;
}
.result-success .check-icon {
  width:56px; height:56px; margin:0 auto 16px; background:var(--success);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:28px; animation: popIn .4s cubic-bezier(.17,.67,.35,1.5);
}
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
.result-success .seat-label { font-size:13px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.result-success .seat-value { font-size:36px; font-weight:900; color:var(--success); line-height:1.2; }
.result-success .name-label { margin-top:16px; font-size:18px; font-weight:500; color:var(--text); }
.result-success .time-label { margin-top:8px; font-size:13px; color:var(--text-dim); }
.result-error {
  background:var(--error-bg); border:1.5px solid var(--error);
  border-radius:var(--radius); padding:24px; text-align:center;
  color:var(--error); font-weight:500;
}
.upload-zone {
  border:2px dashed var(--border); border-radius:var(--radius);
  padding:40px 20px; text-align:center; cursor:pointer; transition:all .3s; margin-bottom:16px;
}
.upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:var(--accent-glow); }
.upload-zone .upload-icon { font-size:40px; margin-bottom:12px; }
.upload-zone .upload-text { font-size:14px; color:var(--text-dim); line-height:1.6; }
.upload-zone .upload-text strong { color:var(--accent); }
.data-table { width:100%; border-collapse:collapse; margin-top:16px; font-size:14px; }
.data-table th { text-align:left; padding:10px 12px; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
.data-table td { padding:12px; border-bottom:1px solid var(--border); }
.data-table tr:last-child td { border-bottom:none; }
.status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }
.status-badge.checked { background:var(--success-bg); color:var(--success); border:1px solid var(--success); }
.status-badge.pending { background:var(--surface2); color:var(--text-dim); border:1px solid var(--border); }
.stats-row { display:flex; gap:12px; margin-bottom:20px; }
.stat-card { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-card .stat-num { font-size:28px; font-weight:900; color:var(--accent); }
.stat-card .stat-label { font-size:12px; color:var(--text-dim); margin-top:4px; letter-spacing:1px; }
.format-hint { background:var(--surface2); border-radius:8px; padding:14px 16px; font-size:13px; color:var(--text-dim); line-height:1.6; margin-bottom:16px; }
.format-hint code { background:var(--bg); padding:2px 6px; border-radius:4px; font-size:12px; color:var(--accent); }
.admin-lock { text-align:center; padding:40px 20px; }
.admin-lock .lock-icon { font-size:48px; margin-bottom:16px; }
.search-bar { position:relative; margin-bottom:16px; }
.search-bar input {
  width:100%; padding:12px 16px 12px 40px; background:var(--surface2);
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-family:inherit; font-size:14px; outline:none;
}
.search-bar input:focus { border-color:var(--accent); }
.search-bar .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:14px; }
.qr-section { text-align:center; padding:20px; }
.qr-section canvas { border-radius:12px; margin:16px auto; display:block; }
.qr-note { font-size:13px; color:var(--text-dim); margin-top:12px; line-height:1.5; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.toast {
  position:fixed; top:20px; left:50%;
  transform: translateX(-50%) translateY(-100px);
  background:var(--surface); border:1px solid var(--border);
  padding:14px 24px; border-radius:50px; font-size:14px;
  z-index:1000; transition: transform .4s cubic-bezier(.17,.67,.35,1.1);
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
  max-width:90vw; text-align:center;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-icon">✦</div>
    <h1>SEMINAR</h1>
    <div class="subtitle">商业研讨会 · 签到系统</div>
  </div>

  <div class="fb-status loading" id="fb-status">⏳ 正在连接数据库...</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('checkin')">签到入口</button>
    <button class="tab" onclick="switchTab('admin')">管理后台</button>
  </div>

  <!-- ═══ Checkin ═══ -->
  <div id="panel-checkin" class="panel active">
    <div class="card">
      <div class="card-title"><span class="dot"></span>参会签到</div>
      <div class="input-group">
        <input type="text" id="checkin-name" placeholder="请输入您的姓名" autocomplete="off" />
      </div>
      <button class="btn btn-primary" onclick="doCheckin()">
        <span>查询签到</span><span>→</span>
      </button>
    </div>
    <div id="checkin-result" class="result-box"></div>
  </div>

  <!-- ═══ Admin ═══ -->
  <div id="panel-admin" class="panel">
    <div id="admin-lock" class="card">
      <div class="admin-lock">
        <div class="lock-icon">🔐</div>
        <p style="color:var(--text-dim);margin-bottom:20px;font-size:14px;">输入管理密码以进入后台</p>
        <div class="input-group">
          <input type="password" id="admin-pwd" placeholder="管理密码" />
        </div>
        <button class="btn btn-primary" onclick="adminLogin()">进入后台</button>
      </div>
    </div>

    <div id="admin-content" style="display:none;">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总人数</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-checked">0</div><div class="stat-label">已签到</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">未签到</div></div>
      </div>

      <div class="card">
        <div class="card-title"><span class="dot"></span>上传座位表</div>
        <div class="format-hint">上传 <code>CSV</code> 文件，格式：<code>姓名,座位号</code>（每行一条）</div>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <div class="upload-icon">📄</div>
          <div class="upload-text">点击上传 或 拖拽文件<br><strong>支持 .csv 文件</strong></div>
        </div>
        <input type="file" id="file-input" accept=".csv" style="display:none" onchange="handleFile(event)" />
        <div style="margin-top:12px;display:flex;gap:8px;">
          <input type="text" id="manual-name" placeholder="姓名" style="flex:1;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;outline:none;" />
          <input type="text" id="manual-seat" placeholder="座位号" style="width:100px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;outline:none;" />
          <button class="btn btn-primary" style="width:auto;padding:12px 20px;font-size:14px;" onclick="manualAdd()">+</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="dot"></span>签到二维码</div>
        <div class="qr-section">
          <p style="color:var(--text-dim);font-size:14px;margin-bottom:16px;">参会者扫描此二维码即可签到</p>
          <canvas id="qr-canvas"></canvas>
          <div id="qr-url" class="qr-note"></div>
          <button class="btn btn-secondary" style="margin-top:16px;" onclick="generateQR()">生成二维码</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="dot"></span>参会人员列表</div>
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="搜索姓名..." oninput="renderTable()" />
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table" id="attendee-table">
            <thead><tr><th>姓名</th><th>座位</th><th>状态</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card" style="border-color:var(--error);">
        <div class="card-title"><span class="dot" style="background:var(--error)"></span>数据管理</div>
        <button class="btn btn-secondary" style="border-color:var(--error);color:var(--error);" onclick="clearAllData()">清空所有数据</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  👇👇👇 把你的 Firebase 配置填在这里 👇👇👇                    ║
// ║  替换下面 4 个引号中的内容，然后上传到 GitHub                    ║
// ╚══════════════════════════════════════════════════════════════╝
const FIREBASE_CONFIG = {
  apiKey:       "AIzaSyBV9_zUHPk8YYoIfvAGnoQL4nyDAw0AMAk",
  authDomain:   "meet-1bb0e.firebaseapp.com",
  databaseURL:  "https://meet-1bb0e-default-rtdb.firebaseio.com",
  projectId:    "meet-1bb0e"
};
// ╔══════════════════════════════════════════════════════════════╗
// ║  👆👆👆 只需要改上面 4 行，其他代码不要动 👆👆👆               ║
// ╚══════════════════════════════════════════════════════════════╝

const ADMIN_PASSWORD = '2026';
let db = null;
let attendees = {};

// ─── Auto-connect Firebase on page load ───
function initFirebase() {
  try {
    if (FIREBASE_CONFIG.apiKey === '在这里粘贴你的apiKey') {
      setStatus('err', '🔴 请先配置 Firebase（见代码顶部）');
      return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();

    // Real-time data sync — ALL visitors get the same data
    db.ref('attendees').on('value', (snapshot) => {
      attendees = snapshot.val() || {};
      updateStats();
      renderTable();
    });

    db.ref('.info/connected').on('value', (snap) => {
      if (snap.val() === true) {
        setStatus('ok', '🟢 数据库已连接');
      } else {
        setStatus('err', '🔴 连接断开，请检查网络');
      }
    });
  } catch (e) {
    console.error(e);
    setStatus('err', '🔴 连接失败：' + e.message);
  }
}

function setStatus(cls, text) {
  const el = document.getElementById('fb-status');
  el.className = 'fb-status ' + cls;
  el.textContent = text;
}

// ─── Tabs ───
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab==='checkin'&&i===0)||(tab==='admin'&&i===1));
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ─── Check-in ───
function doCheckin() {
  const input = document.getElementById('checkin-name');
  const name = input.value.trim();
  const box = document.getElementById('checkin-result');

  if (!name) { showToast('请输入您的姓名'); input.focus(); return; }
  if (!db) { box.innerHTML = '<div class="result-error"><div style="font-size:32px;margin-bottom:12px;">⚠️</div><div>系统未连接数据库，请联系工作人员</div></div>'; box.classList.add('show'); return; }

  let foundKey = null, person = null;
  for (const [key, val] of Object.entries(attendees)) {
    if (val.name === name) { foundKey = key; person = val; break; }
  }

  if (!person) {
    box.innerHTML = `<div class="result-error"><div style="font-size:32px;margin-bottom:12px;">😔</div><div>未找到「${esc(name)}」的签到信息</div><div style="font-size:13px;margin-top:8px;opacity:.7;">请确认姓名是否正确，或联系工作人员</div></div>`;
    box.classList.add('show'); input.value = ''; return;
  }

  const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
  if (!person.checked) {
    db.ref('attendees/' + foundKey).update({ checked: true, checkedAt: now });
  }

  box.innerHTML = `<div class="result-success"><div class="check-icon">✓</div><div class="seat-label">您的座位</div><div class="seat-value">${esc(person.seat)}</div><div class="name-label">${esc(person.name)}，欢迎参加！</div><div class="time-label">签到时间：${person.checkedAt || now}</div></div>`;
  box.classList.add('show'); input.value = '';
}

// ─── Admin ───
function adminLogin() {
  if (document.getElementById('admin-pwd').value === ADMIN_PASSWORD) {
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
  } else { showToast('密码错误'); }
}

// ─── File Upload ───
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => parseCSV(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';
}

function parseCSV(text) {
  if (!db) { showToast('数据库未连接'); return; }
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const existingNames = new Set(Object.values(attendees).map(a => a.name));
  const updates = {};
  let added = 0;

  for (const line of lines) {
    const parts = line.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
    if (parts.length >= 2) {
      const [name, seat] = parts;
      if (name && seat && !/^(姓名|name)$/i.test(name) && !existingNames.has(name)) {
        const key = db.ref('attendees').push().key;
        updates['attendees/' + key] = { name, seat, checked: false, checkedAt: null };
        existingNames.add(name);
        added++;
      }
    }
  }

  if (added > 0) {
    db.ref().update(updates)
      .then(() => showToast(`成功导入 ${added} 位参会者`))
      .catch(e => showToast('导入失败：' + e.message));
  } else {
    showToast('没有新增数据（可能已存在或格式不对）');
  }
}

// ─── Manual Add ───
function manualAdd() {
  if (!db) { showToast('数据库未连接'); return; }
  const name = document.getElementById('manual-name').value.trim();
  const seat = document.getElementById('manual-seat').value.trim();
  if (!name || !seat) { showToast('请填写姓名和座位号'); return; }
  if (Object.values(attendees).some(a => a.name === name)) { showToast('该姓名已存在'); return; }

  db.ref('attendees').push({ name, seat, checked: false, checkedAt: null })
    .then(() => {
      document.getElementById('manual-name').value = '';
      document.getElementById('manual-seat').value = '';
      showToast(`已添加 ${name}`);
    })
    .catch(e => showToast('添加失败：' + e.message));
}

// ─── Stats & Table ───
function updateStats() {
  const list = Object.values(attendees);
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-checked').textContent = list.filter(a => a.checked).length;
  document.getElementById('stat-pending').textContent = list.filter(a => !a.checked).length;
}

function renderTable() {
  const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  const tbody = document.querySelector('#attendee-table tbody');
  const list = Object.values(attendees).filter(a => !q || a.name.toLowerCase().includes(q));
  tbody.innerHTML = list.length ? list.map(a => `
    <tr>
      <td style="font-weight:500;">${esc(a.name)}</td>
      <td style="color:var(--accent);font-weight:700;">${esc(a.seat)}</td>
      <td><span class="status-badge ${a.checked?'checked':'pending'}">${a.checked?'已签到':'未签到'}</span></td>
    </tr>`).join('') :
    '<tr><td colspan="3" style="text-align:center;color:var(--text-dim);padding:32px;">暂无数据</td></tr>';
}

// ─── QR ───
function generateQR() {
  const url = window.location.href.split('?')[0].split('#')[0];
  new QRious({ element: document.getElementById('qr-canvas'), value: url, size: 220, backgroundAlpha: 0, foreground: '#c9a54e', level: 'H' });
  document.getElementById('qr-url').textContent = '链接：' + url;
  showToast('二维码已生成');
}

// ─── Clear ───
function clearAllData() {
  if (!db) return;
  if (confirm('确定清空所有数据？不可恢复。')) {
    db.ref('attendees').remove()
      .then(() => showToast('数据已清空'))
      .catch(e => showToast('操作失败：' + e.message));
  }
}

// ─── Helpers ───
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

// ─── Drag & Drop ───
const uz = document.getElementById('upload-zone');
if (uz) {
  uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('drag-over'); });
  uz.addEventListener('dragleave', () => uz.classList.remove('drag-over'));
  uz.addEventListener('drop', e => {
    e.preventDefault(); uz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.csv')) {
      const r = new FileReader();
      r.onload = ev => parseCSV(ev.target.result);
      r.readAsText(f);
    } else showToast('请上传 .csv 文件');
  });
}

// ─── Enter keys ───
document.getElementById('checkin-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') doCheckin(); });
document.getElementById('admin-pwd')?.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

// ─── Start ───
initFirebase();
</script>
</body>
</html>
