functiondoCheckin(){
constinput=document.getElementById('checkin-name'),name=input.value.trim();
constbox=document.getElementById('checkin-result'),mapA=document.getElementById('seat-map-area');
if(!name){showToast('请输入姓名');input.focus();return;}
if(!db){box.innerHTML='<divclass="result-error">⚠️未连接数据库</div>';box.classList.add('show');mapA.innerHTML='';return;}
constp=findAttendee(name);
if(!p){box.innerHTML=`<divclass="result-error"><divstyle="font-size:32px;margin-bottom:12px">😔</div><div>未找到「${esc(name)}」</div><divstyle="font-size:13px;margin-top:8px;opacity:.7">请确认姓名</div></div>`;box.classList.add('show');mapA.innerHTML='';input.value='';return;}
constnow=newDate().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
if(!p.checked)db.ref('attendees/'+p.key).update({checked:true,checkedAt:now});
box.innerHTML=`<divclass="result-success"><divclass="check-icon">✓</div><divclass="seat-label">您的座位</div><divclass="seat-value">${esc(p.seat)}</div><divclass="name-label">${esc(p.name)}，欢迎！</div><divclass="time-label">${p.checkedAt||now}</div></div>`;
box.classList.add('show');
buildSeatMap(p.name,mapA);
input.value='';
}

functionhandleFile(e){constf=e.target.files[0];if(!f)return;constr=newFileReader();r.onload=ev=>parseCSV(ev.target.result);r.readAsText(f);e.target.value='';}

functionparseCSV(text){
if(!db){showToast('未连接');return;}
constlines=text.split(/\r?\n/).filter(l=>l.trim());
constexist=newSet(Object.values(attendees).map(a=>normName(a.name)));
constupd={};letadded=0;
for(constlineoflines){constp=line.split(',').map(s=>s.trim().replace(/^["']|["']$/g,''));
if(p.length>=2){const[name,seat]=p;if(name&&seat&&!/^(姓名|name)$/i.test(name)&&!exist.has(normName(name))){constk=db.ref('attendees').push().key;upd['attendees/'+k]={name,seat,checked:false,checkedAt:null};exist.add(normName(name));added++;}}}
if(added>0)db.ref().update(upd).then(()=>showToast(`导入${added}位`));elseshowToast('无新增');
}

functionupdateStats(){constl=Object.values(attendees);document.getElementById('stat-total').textContent=l.length;document.getElementById('stat-checked').textContent=l.filter(a=>a.checked).length;document.getElementById('stat-pending').textContent=l.filter(a=>!a.checked).length;}

functionrenderTable(){constq=(document.getElementById('search-input')?.value||'').trim().toLowerCase();consttb=document.getElementById('tb');constl=Object.values(attendees).filter(a=>!q||a.name.toLowerCase().includes(q));tb.innerHTML=l.length?l.map(a=>`<tr><tdstyle="font-weight:500">${esc(a.name)}</td><tdstyle="color:var(--accent);font-weight:700;font-size:12px">${esc(a.seat)}</td><td><spanclass="status-badge${a.checked?'checked':'pending'}">${a.checked?'已签到':'未签到'}</span></td></tr>`).join(''):'<tr><tdcolspan="3"style="text-align:center;color:var(--text-dim);padding:28px">暂无数据</td></tr>';}

functiongenerateQR(){constu=location.href.split('?')[0].split('#')[0];newQRious({element:document.getElementById('qr-canvas'),value:u,size:200,backgroundAlpha:0,foreground:'#c9a54e',level:'H'});document.getElementById('qr-url').textContent=u;showToast('已生成');}
functionclearAllData(){if(!db)return;if(confirm('确定清空？'))db.ref('attendees').remove().then(()=>showToast('已清空'));}
functionesc(s){constd=document.createElement('div');d.textContent=s||'';returnd.innerHTML;}
